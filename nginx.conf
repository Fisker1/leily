server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse-proxy awareness (Tailscale Serve, Cloudflare, etc.) ──
    # Trust X-Forwarded-* headers from any upstream proxy.
    # Tailscale Serve terminates TLS and forwards to this container.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Cache static assets (hashed filenames from Vite) ─────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — all routes serve index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching index.html itself (so deploys take effect)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
