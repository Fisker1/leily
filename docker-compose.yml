# ─── Leily — Self-Hosted Property Management ────────────
# 2 containers. No cloud. All data on your machine.
#
# Usage:
#   docker compose up -d --build
#   Open http://localhost:3001
#
# Data lives in the `leily-data` volume (SQLite).

services:

  # ── Frontend (React + nginx) ───────────────────────────
  frontend:
    build: .
    container_name: leily-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3000"
    depends_on:
      - api

  # ── API (Hono + SQLite) ────────────────────────────────
  api:
    build: ./api
    container_name: leily-api
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      DB_PATH: /app/data/leily.db
    volumes:
      - leily-data:/app/data

volumes:
  leily-data:
