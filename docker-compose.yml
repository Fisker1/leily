# Leily — Full Self-Hosted Stack
# Based on Supabase self-hosting (https://supabase.com/docs/guides/self-hosting/docker)
#
# Usage:
#   1. Copy .env.selfhost.example → .env  and fill in secrets
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# First run will apply the baseline migration automatically via the
# /docker-entrypoint-initdb.d mount.

services:

  # ─── Postgres ────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.060
    container_name: leily-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXP:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./volumes/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_connections=200

  # ─── Supabase Studio (optional admin UI) ─────────────────────
  studio:
    image: supabase/studio:20250317-6471e17
    container_name: leily-studio
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-54323}:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DEFAULT_ORGANIZATION_NAME: Leily
      DEFAULT_PROJECT_NAME: leily
    depends_on:
      meta:
        condition: service_healthy
      kong:
        condition: service_healthy

  # ─── Kong API Gateway ────────────────────────────────────────
  kong:
    image: kong:2.8.1
    container_name: leily-kong
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-8443}:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./volumes/kong/kong.yml:/home/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  # ─── GoTrue (Auth) ──────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.170.0
    container_name: leily-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_SIGN_INS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@leily.local}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Leily}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 100
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── PostgREST (REST API) ───────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.8
    container_name: leily-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXP:-3600}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Storage ────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.14.5
    container_name: leily-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
      POSTGREST_URL: http://rest:3000
      IMGPROXY_URL: http://imgproxy:8080
    volumes:
      - storage-data:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Image proxy (for storage transformations) ──────────────
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: leily-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Postgres Meta (required by Studio) ─────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: leily-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Edge Functions (Deno) ──────────────────────────────────
  functions:
    image: supabase/edge-runtime:v1.67.4
    container_name: leily-functions
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      VERIFY_JWT: "false"
      # App-specific secrets for edge functions
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAPBOX_PUBLIC_TOKEN: ${MAPBOX_PUBLIC_TOKEN:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      MICROSOFT_EMAIL_USER: ${MICROSOFT_EMAIL_USER:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SIGNICAT_CLIENT_ID: ${SIGNICAT_CLIENT_ID:-}
      SIGNICAT_CLIENT_SECRET: ${SIGNICAT_CLIENT_SECRET:-}
      SCRIVE_CLIENT_ID: ${SCRIVE_CLIENT_ID:-}
      SCRIVE_CLIENT_SECRET: ${SCRIVE_CLIENT_SECRET:-}
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    depends_on:
      kong:
        condition: service_healthy
    command:
      - start
      - --main-service
      - /home/deno/functions/main

  # ─── Leily Frontend (nginx) ─────────────────────────────────
  leily:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${API_EXTERNAL_URL:-http://localhost:8000}
        - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
        - VITE_SUPABASE_PROJECT_ID=local
        - VITE_APP_URL=${SITE_URL:-http://localhost:3000}
        - VITE_ENVIRONMENT=production
        - VITE_COMING_SOON=false
        - VITE_ENABLE_ANALYTICS=false
        - VITE_DEBUG=false
    container_name: leily-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy

volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
