# Docker Security Configuration for Leily Application
# This file provides security-focused Docker Compose configuration

version: '3.8'

services:
  # Security-hardened application service
  app-secure:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Security: Use specific versions
        NODE_VERSION: "20-alpine"
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - VITE_ENVIRONMENT=production
    env_file:
      - .env
    networks:
      - leily-secure
    restart: unless-stopped
    # Security: Run as non-root user
    user: "1001:1001"
    # Security: Read-only root filesystem
    read_only: true
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: Add only necessary capabilities
    cap_add:
      - NET_BIND_SERVICE
    # Security: Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # Security: Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Tmpfs for writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/cache/nginx:noexec,nosuid,size=50m
    # Security: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Security-hardened PostgreSQL
  postgres-secure:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: leily_secure
      POSTGRES_USER: leily_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_secure_data:/var/lib/postgresql/data
      - ./security/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - leily-secure
    restart: unless-stopped
    # Security: Run as postgres user
    user: "999:999"
    # Security: Read-only root filesystem
    read_only: true
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Security: Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leily_user -d leily_secure"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Tmpfs for writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/run/postgresql:noexec,nosuid,size=10m
    # Security: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Security-hardened Redis
  redis-secure:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_secure_data:/data
    networks:
      - leily-secure
    restart: unless-stopped
    # Security: Run as redis user
    user: "999:999"
    # Security: Read-only root filesystem
    read_only: true
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    # Security: Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Tmpfs for writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    # Security: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Security-hardened Nginx
  nginx-secure:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-security.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./security/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app-secure
    networks:
      - leily-secure
    restart: unless-stopped
    # Security: Run as nginx user
    user: "101:101"
    # Security: Read-only root filesystem
    read_only: true
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    # Security: Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Tmpfs for writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/nginx:noexec,nosuid,size=100m
      - /var/run:noexec,nosuid,size=10m
    # Security: Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_secure_data:
    driver: local
  redis_secure_data:
    driver: local

networks:
  leily-secure:
    driver: bridge
    # Security: Enable network encryption
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
