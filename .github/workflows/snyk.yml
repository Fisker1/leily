# Snyk Security Scanning Workflow
# Scans for vulnerabilities in dependencies, containers, and infrastructure
name: Snyk Security Scan

on:
  push:
    branches: [ main, stage ]
  pull_request:
    branches: [ main, stage ]
  # Ensure Dependabot PRs can access repo secrets safely using base-branch workflow
  pull_request_target:
    branches: [ main, stage ]
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # Node.js dependency scanning
  snyk-dependencies:
    name: Snyk Dependencies Scan
    runs-on: ubuntu-latest
    # Run on normal events; for pull_request_target only allow Dependabot
    if: ${{ github.event_name != 'pull_request_target' || github.actor == 'dependabot[bot]' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=package.json --sarif-file-output=snyk.sarif

      - name: Monitor project in Snyk (dependencies)
        if: ${{ success() }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  # Docker container scanning
  snyk-container:
    name: Snyk Container Scan
    runs-on: ubuntu-latest
    needs: snyk-dependencies
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t leily:latest .

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: leily:latest
          args: --severity-threshold=high --sarif-file-output=snyk-container.sarif

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-container.sarif

  # Infrastructure as Code scanning (if applicable)
  snyk-iac:
    name: Snyk Infrastructure Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request_target' || github.actor == 'dependabot[bot]' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Infrastructure as Code test
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-iac.sarif

      - name: Upload IaC scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-iac.sarif

  # Security policy check
  snyk-policy:
    name: Snyk Policy Check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request_target' || github.actor == 'dependabot[bot]' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk test with policy
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --policy-path=.snyk --file=package.json

  # Generate security report
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [snyk-dependencies, snyk-container, snyk-iac]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Snyk report
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "### Dependencies: ${{ needs.snyk-dependencies.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### Container: ${{ needs.snyk-container.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure: ${{ needs.snyk-iac.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports at [Snyk Dashboard](https://app.snyk.io)" >> $GITHUB_STEP_SUMMARY
