name: Supabase CI (staging/prod)

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Select target environment
        id: target
        run: |
          if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "project_id=${{ secrets.SUPABASE_PROJECT_ID_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "env=production" >> $GITHUB_OUTPUT
            echo "project_id=${{ secrets.SUPABASE_PROJECT_ID_PROD }}" >> $GITHUB_OUTPUT
          fi
      - name: Link project
        run: supabase link --project-ref "${{ steps.target.outputs.project_id }}" --password "$SUPABASE_DB_PASSWORD"
      - name: Push migrations
        run: supabase db push

  functions:
    runs-on: ubuntu-latest
    needs: migrate
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Select target project
        id: target
        run: |
          if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "project_id=${{ secrets.SUPABASE_PROJECT_ID_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "project_id=${{ secrets.SUPABASE_PROJECT_ID_PROD }}" >> $GITHUB_OUTPUT
          fi
      - name: Link project
        run: supabase link --project-ref "${{ steps.target.outputs.project_id }}"
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "${{ steps.target.outputs.project_id }}" --no-verify-jwt


