version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    rebase-strategy: auto
    # Group updates to reduce PR noise
    groups:
      dev-deps:
        patterns:
          - "eslint*"
          - "@types/*"
          - "typescript*"
          - "vitest*"
          - "tailwind*"
        update-types: ["minor", "patch"]
      react-stack:
        patterns:
          - "react*"
          - "@tanstack/*"
        update-types: ["minor", "patch"]
      misc:
        patterns:
          - "*"
        exclude-patterns:
          - "react*"
          - "@tanstack/*"
          - "eslint*"
          - "@types/*"
          - "typescript*"
          - "vitest*"
          - "tailwind*"
        update-types: ["minor", "patch"]
    # Keep versions sensible
    versioning-strategy: increase-if-necessary
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    
  # Enable security updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "github-actions"
      - "security"
    commit-message:
      prefix: "ci"
